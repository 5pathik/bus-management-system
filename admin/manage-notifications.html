<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <li><a href="notifications.html">Notifications</a></li>
  <title>Manage Notifications</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="dashboard">

  <aside class="sidebar">
    <h2>Admin Panel</h2>

    <ul>
      <li><a href="admin-dashboard.html">Dashboard</a></li>
      <li><a href="manage-students.html">Manage Students</a></li>
      <li><a href="manage-conductors.html">Manage Conductors</a></li>
      <li><a href="manage-routes.html">Manage Routes</a></li>
      <li><a href="reports.html">Reports</a></li>
      <li><a href="manage-notifications.html">Notifications</a></li>
    </ul>

    <button class="btn logout-btn" onclick="logoutUser()">
      Logout
    </button>
  </aside>

  <main class="dashboard-content">

    <h1>Send Notification</h1>

    <div class="form-card">

      <form id="notificationForm">

        <input
          type="text"
          id="notificationTitle"
          placeholder="Notification Title"
          required
        >

        <textarea
          id="notificationMessage"
          placeholder="Write notification..."
          required
        ></textarea>

        <button type="submit" class="btn">
          Send Notification
        </button>

      </form>

    </div>

  </main>

</div>

<script type="module" src="manage-notifications.js"></script>

</body>
</html>
