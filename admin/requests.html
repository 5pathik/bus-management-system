<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Requests</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">🚌</div>
        <div>
          <h2>Admin Panel</h2>
          <p>BusManage</p>
        </div>
      </div>

      <ul>
        <li><a href="admin-dashboard.html">Dashboard</a></li>
        <li><a class="active-link" href="requests.html">Requests</a></li>
      </ul>

      <button class="btn logout-btn" onclick="logoutUser()">Logout</button>
    </aside>

    <main class="dashboard-content">
      <div class="admin-topbar">
        <div>
          <h1>Pending Requests</h1>
          <p>Approve student registration requests and create login access.</p>
        </div>
        <div class="admin-date" id="currentDate"></div>
      </div>

      <section class="panel-card">
        <div class="section-header">
          <h2>Student Requests</h2>
          <span class="alert-badge" id="requestCount">0 Requests</span>
        </div>

        <div id="requestsList" class="requests-grid">
          Loading requests...
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="../js/auth.js"></script>
  <script type="module" src="requests.js"></script>

  <script>
    const currentDate = document.getElementById("currentDate");
    if (currentDate) {
      currentDate.textContent = new Date().toLocaleDateString(undefined, {
        weekday: "long",
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }
  </script>
</body>
</html>
